# ── Staleks ERP — Production Nginx Config ─────────────────────────────────────

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:3000;
}

# ── HTTP server — redirect to HTTPS (keep ACME for cert renewal) ─────────────
server {
    listen 80;
    server_name erp.staleks.kz;

    # ── Let's Encrypt challenge ────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Redirect everything else to HTTPS ─────────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name erp.staleks.kz;

    ssl_certificate /etc/letsencrypt/live/erp.staleks.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.staleks.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 10m;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    # ── Next.js static files (immutable cache) ────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Guide screenshots (served directly by nginx) ───────────────────────────
    location ~* ^/guide/.*\.(png|jpg|jpeg|webp|gif|svg)$ {
        root /var/www;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Frontend (catch-all) ──────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
